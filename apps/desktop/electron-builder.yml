appId: com.urdigix.solutions.erp
productName: URDIGIX Solutions ERP
copyright: Copyright © 2024-2026 URDIGIX Solutions (Pty) Ltd

directories:
  buildResources: build
  output: release

asar: true

files:
  - dist/**/*
  - "!node_modules/**/*"

extraResources:
  - from: resources/
    to: resources/
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: "${productName}-Setup-${version}.${ext}"
  publisherName: URDIGIX Solutions (Pty) Ltd
  verifyUpdateCodeSignature: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: URDIGIX Solutions ERP
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  license: LICENSE
  perMachine: false
  deleteAppDataOnUninstall: false

fileAssociations:
  - ext: urdigix
    name: URDIGIX Project File
    description: URDIGIX Solutions ERP Project File
    mimeType: application/x-urdigix
    icon: build/file-icon.ico
    role: Editor

publish:
  provider: github
  owner: urdigix
  repo: urdigix-erp
  releaseType: release
